name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, xml, curl, zip, intl, gd, bcmath, mysql, redis
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Composer install (prod only)
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Build front-end assets
        run: |
          npm ci
          npm run build

      - name: Package release tarball
        run: |
          tar --exclude='./node_modules' \
              --exclude='./.git' \
              --exclude='./tests' \
              --exclude='./.github' \
              --exclude='./.env' \
              --exclude='./storage' \
              -czf /tmp/release.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: /tmp/release.tar.gz
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release

      - name: Bring up Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          version: latest

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ship release
        run: scp release.tar.gz deploy@${{ secrets.SSH_HOST }}:/tmp/release.tar.gz

      - name: Deploy on server
        run: |
          ssh deploy@${{ secrets.SSH_HOST }} 'bash -se' <<'REMOTE'
            set -euo pipefail
            # Group-writable by default so anything this script creates can later be
            # written by php-fpm (www-data), and vice versa. The SSH session is
            # non-interactive so it doesn't read /etc/profile — set it explicitly here.
            umask 0002
            SITE=/var/www/personal-site
            DATA=/var/www/personal-site-data

            # Extract over the existing tree. Tarball excludes .env + storage,
            # so the symlinks below are preserved across deploys.
            tar -xzf /tmp/release.tar.gz -C "$SITE" --overwrite
            rm /tmp/release.tar.gz

            # (Re)create symlinks to persistent data — idempotent
            ln -sfn "$DATA/.env"    "$SITE/.env"
            ln -sfn "$DATA/storage" "$SITE/storage"

            # Make sure bootstrap/cache and Livewire's upload temp dir exist. No chown/chmod
            # needed: php-fpm and deploy both run umask 0002 and storage dirs are setgid, so
            # every file either creates is group-writable (664) and stays in the www-data
            # group. See container-setup.md "Permissions".
            mkdir -p "$SITE/bootstrap/cache" "$DATA/storage/app/private/livewire-tmp"

            # Refuse to deploy if .env is empty — otherwise Laravel silently falls back to
            # SQLite defaults and migrations land in the wrong database.
            if [ ! -s "$DATA/.env" ]; then
              echo "ERROR: $DATA/.env is empty. Bootstrap it before deploying." >&2
              exit 1
            fi

            # Laravel post-install
            cd "$SITE"
            php artisan migrate --force
            php artisan optimize                 # config:cache + route:cache + view:cache + event:cache
            php artisan storage:link || true
            php artisan filament:optimize || true

            # OPcache picks up new files on next request because we keep
            # opcache.validate_timestamps=1, but a reload is cheap and explicit:
            sudo /bin/systemctl reload php8.5-fpm
          REMOTE

      - name: Show Laravel log on failure
        if: failure()
        run: |
          ssh deploy@${{ secrets.SSH_HOST }} 'tail -200 /var/www/personal-site-data/storage/logs/laravel.log || echo "(no laravel log yet)"'
